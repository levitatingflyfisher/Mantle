<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
  <!-- tectonic-expressed: frame and joints celebrated, visible -->
  <g fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M50 170 L50 60 L100 30 L150 60 L150 170"/>
    <!-- expressed horizontal tie beams -->
    <line x1="50" y1="110" x2="150" y2="110"/>
    <line x1="70" y1="84" x2="130" y2="84"/>
  </g>
  <!-- joints highlighted as main feature -->
  <circle cx="100" cy="30" r="5" fill="#C4553B" stroke="none"/>
  <circle cx="50" cy="60" r="4" fill="#C4553B" stroke="none"/>
  <circle cx="150" cy="60" r="4" fill="#C4553B" stroke="none"/>
  <circle cx="50" cy="110" r="3" fill="#C4553B" stroke="none"/>
  <circle cx="150" cy="110" r="3" fill="#C4553B" stroke="none"/>
  <line x1="100" y1="35" x2="100" y2="170" fill="none" stroke="#8FB3C7" stroke-width="1" stroke-dasharray="3 4" opacity="0.7"/>
</svg>
