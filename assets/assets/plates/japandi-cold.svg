<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
  <!-- japandi-cold: cold minimalism without warmth, all restraint no comfort -->
  <g fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
    <!-- severe symmetrical layout, no organic softness -->
    <line x1="38" y1="152" x2="162" y2="152"/>
    <rect x="52" y="116" width="48" height="36"/>
    <rect x="110" y="116" width="42" height="36"/>
  </g>
  <!-- too many rigid guides - cold, structured -->
  <line x1="38" y1="64" x2="162" y2="64" fill="none" stroke="#8FB3C7" stroke-width="1" stroke-dasharray="3 4" opacity="0.7"/>
  <line x1="38" y1="100" x2="162" y2="100" fill="none" stroke="#8FB3C7" stroke-width="1" stroke-dasharray="3 4" opacity="0.7"/>
  <line x1="100" y1="38" x2="100" y2="152" fill="none" stroke="#8FB3C7" stroke-width="1" stroke-dasharray="3 4" opacity="0.7"/>
</svg>
