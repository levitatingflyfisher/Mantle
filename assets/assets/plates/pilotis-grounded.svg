<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
  <!-- pilotis-grounded: building sits directly on ground, no separation -->
  <g fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
    <!-- mass sits directly on ground plane -->
    <rect x="46" y="60" width="108" height="110"/>
    <!-- solid base, no columns lifting it -->
    <line x1="46" y1="170" x2="154" y2="170"/>
  </g>
  <line x1="38" y1="170" x2="162" y2="170" fill="none" stroke="#8FB3C7" stroke-width="1" stroke-dasharray="3 4" opacity="0.7"/>
  <!-- ground contact -->
  <path d="M46 170 L154 170" fill="none" stroke="#C4553B" stroke-width="1.8" stroke-linecap="round"/>
</svg>
