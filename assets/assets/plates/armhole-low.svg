  <!-- low armhole - no gap, wide scye -->
  <path d="M78 80 Q58 100 60 148" fill="none" stroke="#C4553B" stroke-width="1.8" stroke-linecap="round"/>
  <text x="100" y="115" fill="#8FB3C7" font-size="8" text-anchor="middle" font-family="monospace">low</text>
</svg>
