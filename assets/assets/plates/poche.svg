<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
  <!-- poche: wall mass with room voids cut out via mask so voids are transparent -->
  <defs>
    <mask id="void-mask">
      <!-- white = opaque (wall), black = cut out (rooms) -->
      <rect x="40" y="30" width="120" height="140" fill="white"/>
      <rect x="62" y="52" width="44" height="44" fill="black"/>
      <rect x="116" y="52" width="30" height="96" fill="black"/>
      <rect x="62" y="106" width="44" height="42" fill="black"/>
    </mask>
  </defs>
  <!-- Wall mass: background fill at reduced opacity, then solid mass with voids cut out -->
  <rect x="40" y="30" width="120" height="140" fill="currentColor" opacity="0.18"/>
  <rect x="40" y="30" width="120" height="140" fill="currentColor" opacity="0.85" mask="url(#void-mask)"/>
  <path d="M106 74 L116 74" fill="none" stroke="#C4553B" stroke-width="1.8" stroke-linecap="round"/>
</svg>
