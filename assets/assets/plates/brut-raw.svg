<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
  <!-- brut-raw: beton brut - concrete left as cast, formwork grain visible -->
  <g fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
    <rect x="50" y="30" width="100" height="140"/>
  </g>
  <!-- formwork board grain lines - horizontal, regular, close -->
  <line x1="50" y1="50" x2="150" y2="50" fill="none" stroke="#8FB3C7" stroke-width="1" stroke-dasharray="3 4" opacity="0.7"/>
  <line x1="50" y1="70" x2="150" y2="70" fill="none" stroke="#8FB3C7" stroke-width="1" stroke-dasharray="3 4" opacity="0.7"/>
  <line x1="50" y1="90" x2="150" y2="90" fill="none" stroke="#8FB3C7" stroke-width="1" stroke-dasharray="3 4" opacity="0.7"/>
  <line x1="50" y1="110" x2="150" y2="110" fill="none" stroke="#8FB3C7" stroke-width="1" stroke-dasharray="3 4" opacity="0.7"/>
  <line x1="50" y1="130" x2="150" y2="130" fill="none" stroke="#8FB3C7" stroke-width="1" stroke-dasharray="3 4" opacity="0.7"/>
  <line x1="50" y1="150" x2="150" y2="150" fill="none" stroke="#8FB3C7" stroke-width="1" stroke-dasharray="3 4" opacity="0.7"/>
  <!-- material truth marker -->
  <path d="M50 100 L150 100" fill="none" stroke="#C4553B" stroke-width="1.8" stroke-linecap="round"/>
</svg>
