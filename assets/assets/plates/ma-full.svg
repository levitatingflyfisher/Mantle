<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
  <!-- ma-full: elements crowded, no interval, no negative space -->
  <g fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
    <!-- elements crowded together, minimal gap -->
    <rect x="40" y="40" width="54" height="120"/>
    <rect x="98" y="40" width="62" height="120"/>
  </g>
  <!-- gap is minimal, not composed -->
  <line x1="94" y1="50" x2="94" y2="150" fill="none" stroke="#8FB3C7" stroke-width="1" stroke-dasharray="3 4" opacity="0.7"/>
  <line x1="40" y1="100" x2="160" y2="100" fill="none" stroke="#8FB3C7" stroke-width="1" stroke-dasharray="3 4" opacity="0.7"/>
</svg>
