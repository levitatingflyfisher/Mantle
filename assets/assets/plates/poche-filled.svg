<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
  <!-- poche-filled: walls solid, rooms as carved transparent voids via mask -->
  <defs>
    <mask id="void-mask-filled">
      <!-- white = opaque (wall), black = cut out (rooms) -->
      <rect x="40" y="30" width="120" height="140" fill="white"/>
      <rect x="54" y="44" width="46" height="46" fill="black"/>
      <rect x="54" y="104" width="46" height="52" fill="black"/>
      <rect x="114" y="44" width="34" height="112" fill="black"/>
    </mask>
  </defs>
  <!-- Solid wall mass with room voids cut out — rooms are transparent pixels -->
  <rect x="40" y="30" width="120" height="140" fill="currentColor" opacity="0.8" mask="url(#void-mask-filled)"/>
  <!-- connection indicator -->
  <path d="M100 68 L114 68" fill="none" stroke="#C4553B" stroke-width="1.8" stroke-linecap="round"/>
</svg>
