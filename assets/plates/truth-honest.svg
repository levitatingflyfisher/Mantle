<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
  <!-- truth-honest: material looks and behaves like itself, no fakery -->
  <g fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
    <!-- wood panel: actual grain pattern -->
    <rect x="46" y="48" width="50" height="104"/>
    <!-- concrete panel: board-mark texture -->
    <rect x="104" y="48" width="50" height="104"/>
  </g>
  <!-- wood grain - organic curves -->
  <path d="M52 70 Q62 68 72 70 Q82 72 90 70" fill="none" stroke="#8FB3C7" stroke-width="1" stroke-dasharray="3 4" opacity="0.7"/>
  <path d="M52 90 Q64 86 74 90 Q84 92 90 90" fill="none" stroke="#8FB3C7" stroke-width="1" stroke-dasharray="3 4" opacity="0.7"/>
  <path d="M52 110 Q60 108 70 110 Q80 114 90 110" fill="none" stroke="#8FB3C7" stroke-width="1" stroke-dasharray="3 4" opacity="0.7"/>
  <!-- concrete board marks - straight lines -->
  <line x1="104" y1="70" x2="154" y2="70" fill="none" stroke="#8FB3C7" stroke-width="1" stroke-dasharray="3 4" opacity="0.7"/>
  <line x1="104" y1="90" x2="154" y2="90" fill="none" stroke="#8FB3C7" stroke-width="1" stroke-dasharray="3 4" opacity="0.7"/>
  <line x1="104" y1="110" x2="154" y2="110" fill="none" stroke="#8FB3C7" stroke-width="1" stroke-dasharray="3 4" opacity="0.7"/>
  <!-- material honesty marker -->
  <path d="M71 55 L71 145" fill="none" stroke="#C4553B" stroke-width="1.8" stroke-linecap="round"/>
</svg>
