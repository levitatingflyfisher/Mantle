<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
  <!-- ma-gap: deliberate charged interval as the focal composition -->
  <g fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
    <!-- two elements with a wide, composed gap between -->
    <rect x="36" y="40" width="52" height="120"/>
    <rect x="112" y="40" width="52" height="120"/>
  </g>
  <!-- the gap is the composition -->
  <line x1="88" y1="50" x2="88" y2="150" fill="none" stroke="#C4553B" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="112" y1="50" x2="112" y2="150" fill="none" stroke="#C4553B" stroke-width="1.8" stroke-linecap="round"/>
  <text x="100" y="104" fill="#8FB3C7" font-size="10" text-anchor="middle" font-family="monospace">間</text>
</svg>
