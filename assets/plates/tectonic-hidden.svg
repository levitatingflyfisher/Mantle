<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
  <!-- tectonic-hidden: structure encased, joints invisible (stereotomic) -->
  <g fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
    <!-- solid mass, no expressed joints -->
    <path d="M46 170 L46 60 L100 32 L154 60 L154 170 Z"/>
  </g>
  <!-- smooth surface, no joint markers -->
  <line x1="46" y1="116" x2="154" y2="116" fill="none" stroke="#8FB3C7" stroke-width="1" stroke-dasharray="3 4" opacity="0.7"/>
  <line x1="46" y1="88" x2="154" y2="88" fill="none" stroke="#8FB3C7" stroke-width="1" stroke-dasharray="3 4" opacity="0.7"/>
</svg>
