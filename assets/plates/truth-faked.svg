<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
  <!-- truth-faked: laminate pretending to be oak / plastic printed to look like stone -->
  <g fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
    <!-- panels side by side -->
    <rect x="46" y="48" width="50" height="104"/>
    <rect x="104" y="48" width="50" height="104"/>
  </g>
  <!-- identical printed pattern on both - same "grain" repeated mechanically -->
  <line x1="52" y1="68" x2="90" y2="68" fill="none" stroke="#8FB3C7" stroke-width="1" stroke-dasharray="3 4" opacity="0.7"/>
  <line x1="52" y1="84" x2="90" y2="84" fill="none" stroke="#8FB3C7" stroke-width="1" stroke-dasharray="3 4" opacity="0.7"/>
  <line x1="52" y1="100" x2="90" y2="100" fill="none" stroke="#8FB3C7" stroke-width="1" stroke-dasharray="3 4" opacity="0.7"/>
  <line x1="52" y1="116" x2="90" y2="116" fill="none" stroke="#8FB3C7" stroke-width="1" stroke-dasharray="3 4" opacity="0.7"/>
  <!-- same on second panel - mechanically repeated -->
  <line x1="110" y1="68" x2="148" y2="68" fill="none" stroke="#8FB3C7" stroke-width="1" stroke-dasharray="3 4" opacity="0.7"/>
  <line x1="110" y1="84" x2="148" y2="84" fill="none" stroke="#8FB3C7" stroke-width="1" stroke-dasharray="3 4" opacity="0.7"/>
  <line x1="110" y1="100" x2="148" y2="100" fill="none" stroke="#8FB3C7" stroke-width="1" stroke-dasharray="3 4" opacity="0.7"/>
  <line x1="110" y1="116" x2="148" y2="116" fill="none" stroke="#8FB3C7" stroke-width="1" stroke-dasharray="3 4" opacity="0.7"/>
</svg>
