<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
  <!-- shibui-quiet: restrained surface that rewards sustained attention -->
  <g fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
    <rect x="58" y="50" width="84" height="100"/>
  </g>
  <!-- minimal: one subtle horizontal, one quiet vertical -->
  <line x1="58" y1="100" x2="142" y2="100" fill="none" stroke="#8FB3C7" stroke-width="1" stroke-dasharray="3 4" opacity="0.7"/>
  <!-- single charged line - the depth that rewards looking -->
  <line x1="100" y1="50" x2="100" y2="150" fill="none" stroke="#C4553B" stroke-width="1.8" stroke-linecap="round"/>
</svg>
