<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
  <!-- collar-notch: notch lapel coat - traditional collar with lapel break -->
  <g fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
    <!-- coat body -->
    <path d="M80 80 Q72 120 78 178 L122 178 Q128 120 120 80"/>
    <!-- left lapel -->
    <path d="M80 80 L74 50 L88 30 L100 22"/>
    <!-- right lapel -->
    <path d="M120 80 L126 50 L112 30 L100 22"/>
    <!-- collar points -->
    <path d="M88 30 L94 44 L100 36 L106 44 L112 30"/>
  </g>
  <line x1="74" y1="80" x2="126" y2="80" fill="none" stroke="#8FB3C7" stroke-width="1" stroke-dasharray="3 4" opacity="0.7"/>
  <path d="M94 44 L100 36 L106 44" fill="none" stroke="#C4553B" stroke-width="1.8" stroke-linecap="round"/>
</svg>
