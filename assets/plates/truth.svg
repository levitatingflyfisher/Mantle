<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
  <!-- truth: truth to materials - wood as wood, concrete as concrete -->
  <g fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
    <rect x="50" y="50" width="46" height="100"/>
    <rect x="104" y="50" width="46" height="100"/>
  </g>
  <!-- grain lines on right panel (structure shown) -->
  <line x1="104" y1="70" x2="150" y2="70" fill="none" stroke="#8FB3C7" stroke-width="1" stroke-dasharray="3 4" opacity="0.7"/>
  <line x1="104" y1="90" x2="150" y2="90" fill="none" stroke="#8FB3C7" stroke-width="1" stroke-dasharray="3 4" opacity="0.7"/>
  <line x1="104" y1="110" x2="150" y2="110" fill="none" stroke="#8FB3C7" stroke-width="1" stroke-dasharray="3 4" opacity="0.7"/>
  <line x1="104" y1="130" x2="150" y2="130" fill="none" stroke="#8FB3C7" stroke-width="1" stroke-dasharray="3 4" opacity="0.7"/>
  <!-- honest material marker on left panel -->
  <path d="M73 60 L73 140" fill="none" stroke="#C4553B" stroke-width="1.8" stroke-linecap="round"/>
</svg>
