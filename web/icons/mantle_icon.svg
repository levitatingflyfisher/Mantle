<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Warm cream background -->
  <rect width="512" height="512" fill="#FBF8F4"/>

  <!-- Mantel / hearth mark in hearth terracotta #A85040 -->
  <!-- Hearth opening: arch (rounded top rectangle) -->
  <!-- Outer mantel frame legs -->
  <rect x="104" y="210" width="48" height="200" rx="4" fill="#A85040"/>
  <rect x="360" y="210" width="48" height="200" rx="4" fill="#A85040"/>

  <!-- Arch bridge / inner mantel top beam (the mantel shelf underside) -->
  <!-- Arch opening: a rounded-top shape in cream, cut from terracotta arch -->
  <!-- Arch background shape: terracotta rectangle covering top of opening -->
  <rect x="104" y="210" width="304" height="170" rx="0" fill="#A85040"/>

  <!-- Hearth arch opening (cream cutout inside the terracotta) -->
  <!-- A rectangle with a semicircle top, starting at y=236, 60px inner margin each side -->
  <path d="M164,380 L164,280 A92,92 0 0,1 348,280 L348,380 Z" fill="#FBF8F4"/>

  <!-- Mantel shelf (prominent horizontal slab at top) -->
  <rect x="80" y="178" width="352" height="40" rx="6" fill="#A85040"/>

  <!-- Small decorative corbels at each leg top -->
  <rect x="96" y="196" width="64" height="22" rx="4" fill="#A85040"/>
  <rect x="352" y="196" width="64" height="22" rx="4" fill="#A85040"/>

  <!-- Hearth floor / base beam -->
  <rect x="80" y="375" width="352" height="30" rx="5" fill="#A85040"/>

  <!-- Subtle flicker dot — a warm ember glow inside arch -->
  <ellipse cx="256" cy="348" rx="22" ry="14" fill="#C47B6A" opacity="0.55"/>
  <ellipse cx="256" cy="345" rx="11" ry="8" fill="#D9A99E" opacity="0.5"/>
</svg>
