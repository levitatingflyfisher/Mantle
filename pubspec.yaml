name: mantle
description: Discover your family's shared aesthetic. Local-first, account-free.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  drift: ">=2.18.0 <2.32.0"
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  path: ^1.9.0
  flutter_svg: ^2.0.0
  pdf: ^3.11.0
  printing: ^5.13.0
  flutter_secure_storage: ^9.2.0
  elo_engine:
    path: ../eloEngine
  openhearth_design:
    path: ../ohStyle/openhearth_design

dev_dependencies:
  flutter_test:
    sdk: flutter
  # Drift pinned <2.32.0 for Dart 3.10.7; run codegen with:
  #   dart run build_runner build --delete-conflicting-outputs --force-jit
  drift_dev: ">=2.18.0 <2.32.0"
  build_runner: ">=2.4.0 <2.15.0"
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/canon.json
    - assets/data/throughlines.json
    - assets/data/spot.json
    - assets/images/deck/manifest.json
    - assets/images/deck/
    - assets/plates/
  fonts:
    - family: Lora
      fonts:
        - asset: assets/fonts/Lora-Regular.ttf
        - asset: assets/fonts/Lora-Italic.ttf
          style: italic
        - asset: assets/fonts/Lora-Medium.ttf
          weight: 500
        - asset: assets/fonts/Lora-Bold.ttf
          weight: 700
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
        - asset: assets/fonts/Nunito-Medium.ttf
          weight: 500
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
